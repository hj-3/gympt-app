name: Backend API CI/CD

on:
  push:
    branches:
      - develop
      - main
    paths:
      - 'backend-api/**'
      - '.github/workflows/backend-api-ci.yml'
  pull_request:
    paths:
      - 'backend-api/**'

env:
  JAVA_VERSION: '21'
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: backend-api
  GITOPS_REPO: hj-3/gympt-gitops

jobs:
  test:
    name: Test Backend API
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'gradle'
      - name: Run tests
        working-directory: backend-api
        run: |
          chmod +x gradlew
          ./gradlew test --no-daemon

  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    permissions:
      id-token: write
      contents: read
    outputs:
      image-tag: ${{ steps.vars.outputs.image-tag }}
      environment: ${{ steps.env.outputs.environment }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set variables
        id: vars
        run: |
          IMAGE_TAG="${{ github.run_number }}${GITHUB_SHA:0:7}"
          echo "short-sha=${GITHUB_SHA:0:7}" >> $GITHUB_OUTPUT
          echo "image-tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
      - name: Determine environment
        id: env
        run: |
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "environment=prod" >> $GITHUB_OUTPUT
          else
            echo "environment=dev" >> $GITHUB_OUTPUT
          fi
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Get AWS Account ID
        id: account
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "account_id=${ACCOUNT_ID}" >> $GITHUB_OUTPUT

      - name: Build and push
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.vars.outputs.image-tag }}
          ENVIRONMENT: ${{ steps.env.outputs.environment }}
        run: |
          cd backend-api
          docker build -t ${ECR_REGISTRY}/gympt-${ENVIRONMENT}/${ECR_REPOSITORY}:${IMAGE_TAG} .
          docker push ${ECR_REGISTRY}/gympt-${ENVIRONMENT}/${ECR_REPOSITORY}:${IMAGE_TAG}
          echo "Built and pushed: ${ECR_REGISTRY}/gympt-${ENVIRONMENT}/${ECR_REPOSITORY}:${IMAGE_TAG}"

  update-gitops:
    name: Update GitOps
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push'
    steps:
      - name: Checkout GitOps
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GITOPS_REPO }}
          token: ${{ secrets.GITOPS_PAT }}
      - name: Update image tag
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image-tag }}
          ENVIRONMENT: ${{ needs.build-and-push.outputs.environment }}
        run: |
          VALUES_FILE="charts/backend-api/values-${ENVIRONMENT}.yaml"

          echo "Updating ${VALUES_FILE} with image tag ${IMAGE_TAG}"
          sed -i "s/tag: \".*\"/tag: \"${IMAGE_TAG}\"/" ${VALUES_FILE}

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ${VALUES_FILE}
          git commit -m "ci: Update backend-api ${ENVIRONMENT} image to ${IMAGE_TAG}

Triggered by: ${{ github.sha }}
Environment: ${ENVIRONMENT}
Image: gympt-${ENVIRONMENT}/backend-api:${IMAGE_TAG}"
          git push
