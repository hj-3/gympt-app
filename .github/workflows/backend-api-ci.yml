name: Backend API CI/CD

on:
  push:
    branches:
      - main
      - dev
    paths:
      - 'backend-api/**'
      - '.github/workflows/backend-api-ci.yml'
  pull_request:
    paths:
      - 'backend-api/**'
  workflow_dispatch:

env:
  JAVA_VERSION: '21'
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: backend-api
  GITOPS_REPO: hj-3/gympt-gitops

jobs:
  build:
    name: Build Backend API
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'gradle'
      - name: Grant execute permission
        working-directory: backend-api
        run: chmod +x gradlew
      - name: Verify Gradle setup
        working-directory: backend-api
        run: |
          ls -la
          ./gradlew --version
      - name: Build without tests
        working-directory: backend-api
        run: ./gradlew clean build -x test --no-daemon --refresh-dependencies

  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'
    permissions:
      id-token: write
      contents: read
    outputs:
      image-tag: ${{ steps.vars.outputs.image-tag }}
      environment: ${{ steps.env.outputs.environment }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set variables
        id: vars
        run: |
          IMAGE_TAG="${{ github.run_number }}-${GITHUB_SHA:0:7}"
          echo "short-sha=${GITHUB_SHA:0:7}" >> $GITHUB_OUTPUT
          echo "image-tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
      - name: Determine environment
        id: env
        run: |
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "environment=prod" >> $GITHUB_OUTPUT
          else
            echo "environment=dev" >> $GITHUB_OUTPUT
          fi
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ steps.env.outputs.environment == 'prod' && vars.AWS_ROLE_PROD || vars.AWS_ROLE_DEV }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Get AWS Account ID
        id: account
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "account_id=${ACCOUNT_ID}" >> $GITHUB_OUTPUT

      - name: Build image
        id: build
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.vars.outputs.image-tag }}
          ENVIRONMENT: ${{ steps.env.outputs.environment }}
        run: |
          cd backend-api
          IMAGE_URI="${ECR_REGISTRY}/gympt-${ENVIRONMENT}/${ECR_REPOSITORY}:${IMAGE_TAG}"
          docker build -t "${IMAGE_URI}" .
          echo "image-uri=${IMAGE_URI}" >> $GITHUB_OUTPUT

      - name: Trivy 취약점 스캔 (리포트 전용)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.build.outputs.image-uri }}
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '0'   # 리포트만 — 취약점이 있어도 빌드를 실패시키지 않음(구축 단계). 안정화 후 '1'로 강화

      - name: Push image
        run: |
          docker push ${{ steps.build.outputs.image-uri }}
          echo "Pushed: ${{ steps.build.outputs.image-uri }}"

  update-gitops:
    name: Update GitOps
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout GitOps
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GITOPS_REPO }}
          ref: main
          token: ${{ secrets.GITOPS_PAT }}
      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
      - name: Update image tag
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image-tag }}
          ENVIRONMENT: ${{ needs.build-and-push.outputs.environment }}
        run: |
          VALUES_FILE="charts/backend-api/values-${ENVIRONMENT}.yaml"

          echo "Updating ${VALUES_FILE} with image tag ${IMAGE_TAG}"
          yq -i '.image.tag = strenv(IMAGE_TAG)' "${VALUES_FILE}"

      - name: Commit and push GitOps update
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image-tag }}
          ENVIRONMENT: ${{ needs.build-and-push.outputs.environment }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet; then
            echo "No GitOps changes to commit"
            exit 0
          fi

          git add "charts/backend-api/values-${ENVIRONMENT}.yaml"
          git commit -m "ci: update backend-api ${ENVIRONMENT} image to ${IMAGE_TAG}"
          git pull --rebase origin main
          git push origin main
