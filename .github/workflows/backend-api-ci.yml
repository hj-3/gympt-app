name: Backend API CI/CD

on:
  push:
    branches:
      - develop
      - main
    paths:
      - 'backend-api/**'
      - '.github/workflows/backend-api-ci.yml'
  pull_request:
    paths:
      - 'backend-api/**'

env:
  JAVA_VERSION: '21'
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: gympt/backend-api
  GITOPS_REPO: gympt/gympt-gitops

jobs:
  test:
    name: Test Backend API
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'gradle'
      - name: Run tests
        working-directory: backend-api
        run: |
          chmod +x gradlew
          ./gradlew test --no-daemon

  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    permissions:
      id-token: write
      contents: read
    outputs:
      short-sha: ${{ steps.vars.outputs.short-sha }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set variables
        id: vars
        run: echo "short-sha=${GITHUB_SHA:0:7}" >> $GITHUB_OUTPUT
      - name: Determine environment
        id: env
        run: |
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "environment=prod" >> $GITHUB_OUTPUT
            echo "role=${{ vars.AWS_ROLE_PROD }}" >> $GITHUB_OUTPUT
            echo "ecr=${{ vars.ECR_REGISTRY_PROD }}" >> $GITHUB_OUTPUT
          else
            echo "environment=dev" >> $GITHUB_OUTPUT
            echo "role=${{ vars.AWS_ROLE_DEV }}" >> $GITHUB_OUTPUT
            echo "ecr=${{ vars.ECR_REGISTRY_DEV }}" >> $GITHUB_OUTPUT
          fi
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./backend-api
          push: true
          tags: ${{ steps.env.outputs.ecr }}/${{ env.ECR_REPOSITORY }}:${{ steps.vars.outputs.short-sha }}

  update-gitops:
    name: Update GitOps
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push'
    steps:
      - name: Checkout GitOps
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GITOPS_REPO }}
          token: ${{ secrets.GITOPS_PAT }}
      - name: Update image tag
        run: |
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            VALUES_FILE="values-prod.yaml"
          else
            VALUES_FILE="values-dev.yaml"
          fi
          cd charts/backend-api
          sed -i "s/tag: \".*\"/tag: \"${{ needs.build-and-push.outputs.short-sha }}\"/" $VALUES_FILE
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add $VALUES_FILE
          git commit -m "Update backend-api image to ${{ needs.build-and-push.outputs.short-sha }}"
          git push
