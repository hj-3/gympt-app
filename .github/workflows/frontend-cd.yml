name: Frontend CD

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-cd.yml'

env:
  AWS_REGION: ap-northeast-2

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get AWS Account ID
        id: aws-account
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "account_id=${ACCOUNT_ID}" >> $GITHUB_OUTPUT

      - name: Get Infrastructure Outputs
        id: infra
        run: |
          # S3 Bucket 이름 조회
          S3_BUCKET=$(aws s3api list-buckets --query "Buckets[?contains(Name, 'gympt-prod-frontend')].Name" --output text)
          echo "s3_bucket=${S3_BUCKET}" >> $GITHUB_OUTPUT

          # CloudFront Distribution ID 조회
          CF_ID=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?Comment=='gympt-prod frontend distribution'].Id" \
            --output text)
          echo "cloudfront_id=${CF_ID}" >> $GITHUB_OUTPUT

          echo "S3 Bucket: ${S3_BUCKET}"
          echo "CloudFront ID: ${CF_ID}"

      - name: Build Frontend
        env:
          NEXT_PUBLIC_API_URL: https://api.gympt.com
          NEXT_PUBLIC_WS_URL: wss://ws.gympt.com
          NEXT_PUBLIC_ENV: production
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Deploy to S3
        run: |
          cd frontend/out
          # Upload static assets (long cache)
          aws s3 sync . s3://${{ steps.infra.outputs.s3_bucket }}/ \
            --exclude "*.html" \
            --cache-control "public, max-age=31536000, immutable" \
            --delete
          # Upload HTML files (no cache)
          aws s3 sync . s3://${{ steps.infra.outputs.s3_bucket }}/ \
            --exclude "*" \
            --include "*.html" \
            --cache-control "public, max-age=0, must-revalidate" \
            --delete

      - name: Invalidate CloudFront Cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.infra.outputs.cloudfront_id }} \
            --paths "/*"

      - name: Deployment Summary
        run: |
          echo "## Frontend Deployment Complete! 🎉" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **S3 Bucket**: ${{ steps.infra.outputs.s3_bucket }}" >> $GITHUB_STEP_SUMMARY
          echo "- **CloudFront ID**: ${{ steps.infra.outputs.cloudfront_id }}" >> $GITHUB_STEP_SUMMARY
          echo "- **URL**: https://gympt.com" >> $GITHUB_STEP_SUMMARY
