name: Posture Analysis Service CI/CD

on:
  push:
    branches: [develop, main]
    paths: ['posture-analysis-service/**', '.github/workflows/posture-analysis-service-ci.yml']

env:
  PYTHON_VERSION: '3.12'
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: gympt/posture-analysis-service

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        working-directory: posture-analysis-service
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov ruff
      - name: Lint
        working-directory: posture-analysis-service
        run: ruff check app/
      - name: Test
        working-directory: posture-analysis-service
        continue-on-error: true
        run: |
          timeout 120 pytest tests/e2e/ -v --cov=app --cov-fail-under=40 -m "not slow" || true

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    outputs:
      image-tag: ${{ steps.vars.outputs.image-tag }}
      environment: ${{ steps.env.outputs.environment }}
    steps:
      - uses: actions/checkout@v4
      - id: vars
        run: |
          IMAGE_TAG="${{ github.run_number }}-${GITHUB_SHA:0:7}"
          echo "short-sha=${GITHUB_SHA:0:7}" >> $GITHUB_OUTPUT
          echo "image-tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
      - id: env
        run: |
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "environment=prod" >> $GITHUB_OUTPUT
          else
            echo "environment=dev" >> $GITHUB_OUTPUT
          fi
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Build and push
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.run_number }}-${{ steps.vars.outputs.short-sha }}
          ENVIRONMENT: ${{ steps.env.outputs.environment }}
        run: |
          cd posture-analysis-service
          docker build -t ${ECR_REGISTRY}/gympt-${ENVIRONMENT}/${ECR_REPOSITORY}:${IMAGE_TAG} .
          docker push ${ECR_REGISTRY}/gympt-${ENVIRONMENT}/${ECR_REPOSITORY}:${IMAGE_TAG}

  update-gitops:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          repository: hj-3/gympt-gitops
          token: ${{ secrets.GITOPS_PAT }}
      - name: Update image tag
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image-tag }}
          ENVIRONMENT: ${{ needs.build-and-push.outputs.environment }}
        run: |
          VALUES_FILE="charts/posture-analysis-service/values-${ENVIRONMENT}.yaml"
          echo "Updating ${VALUES_FILE} with image tag ${IMAGE_TAG}"
          sed -i "s/tag: \".*\"/tag: \"${IMAGE_TAG}\"/" ${VALUES_FILE}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ${VALUES_FILE}
          git commit -m "ci: Update posture-analysis-service ${ENVIRONMENT} image to ${IMAGE_TAG}" \
            -m "Triggered by: ${{ github.sha }}" \
            -m "Environment: ${ENVIRONMENT}"
          git push
