name: Frontend Deploy

on:
  push:
    branches:
      - develop
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-deploy.yml'

env:
  NODE_VERSION: '20'
  AWS_REGION: ap-northeast-2

jobs:
  deploy:
    name: Build and Deploy Frontend
    runs-on: ubuntu-latest

    permissions:
      id-token: write   # Required for OIDC
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run linter
        working-directory: frontend
        run: npm run lint || true

      - name: Run type check
        working-directory: frontend
        run: npm run typecheck

      - name: Determine environment
        id: env
        run: |
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "environment=prod" >> $GITHUB_OUTPUT
            echo "bucket=gympt-fe-deploy-337112169365" >> $GITHUB_OUTPUT
            echo "distribution=E14Z61F5I2E9ZM" >> $GITHUB_OUTPUT
            echo "api_url=https://api.g2mpt.com" >> $GITHUB_OUTPUT
          else
            echo "environment=dev" >> $GITHUB_OUTPUT
            echo "bucket=gympt-dev-frontend-337112169365" >> $GITHUB_OUTPUT
            echo "distribution=TBD" >> $GITHUB_OUTPUT
            echo "api_url=https://api-dev.g2mpt.com" >> $GITHUB_OUTPUT
          fi

      - name: Build frontend
        working-directory: frontend
        run: |
          if [ "${{ steps.env.outputs.environment }}" == "prod" ]; then
            npm run build:prod
          else
            npm run build:dev
          fi
        env:
          NEXT_PUBLIC_API_URL: ${{ steps.env.outputs.api_url }}
          NEXT_PUBLIC_ENV: ${{ steps.env.outputs.environment }}
          NEXT_PUBLIC_AWS_REGION: ap-northeast-2
          NEXT_PUBLIC_COGNITO_USER_POOL_ID: ${{ secrets.COGNITO_USER_POOL_ID }}
          NEXT_PUBLIC_COGNITO_CLIENT_ID: ${{ secrets.COGNITO_CLIENT_ID }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ steps.env.outputs.environment == 'prod' && vars.AWS_ROLE_PROD || vars.AWS_ROLE_DEV }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync to S3 (static assets with long cache)
        working-directory: frontend/out
        run: |
          # Next.js static files (_next/)
          aws s3 sync _next/static/ s3://${{ steps.env.outputs.bucket }}/_next/static/ \
            --cache-control "public, max-age=31536000, immutable"

      - name: Sync to S3 (HTML and other files with no cache)
        working-directory: frontend/out
        run: |
          # HTML files and other dynamic content
          aws s3 sync . s3://${{ steps.env.outputs.bucket }}/ \
            --delete \
            --cache-control "no-cache, no-store, must-revalidate" \
            --exclude "_next/static/*"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.env.outputs.distribution }} \
            --paths "/*"

      - name: Deployment summary
        run: |
          echo "### Deployment Summary :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: ${{ steps.env.outputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "- **S3 Bucket**: ${{ steps.env.outputs.bucket }}" >> $GITHUB_STEP_SUMMARY
          echo "- **CloudFront**: ${{ steps.env.outputs.distribution }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: \`${GITHUB_SHA:0:7}\`" >> $GITHUB_STEP_SUMMARY
