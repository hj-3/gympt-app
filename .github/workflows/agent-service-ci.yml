name: Agent Service CI/CD

on:
  push:
    branches: [main, dev]
    paths: ['agent-service/**', '.github/workflows/agent-service-ci.yml']
  pull_request:
    paths: ['agent-service/**', '.github/workflows/agent-service-ci.yml']
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.12'
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: agent-service
  GITOPS_REPO: hj-3/gympt-gitops

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - name: Install dependencies
        working-directory: agent-service
        run: |
          pip install -r requirements.txt
          pip install ruff pytest pytest-cov
      - name: Lint with ruff
        working-directory: agent-service
        run: ruff check app/
      - name: Run tests
        working-directory: agent-service
        continue-on-error: true
        run: pytest tests/ -v --cov=app --cov-report=xml --ignore=tests/integration --ignore=tests/e2e --ignore=tests/performance -m "not slow"
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: agent-service/coverage.xml
          flags: agent-service

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'pull_request'
    permissions:
      id-token: write
      contents: read
    outputs:
      image-tag: ${{ steps.vars.outputs.image-tag }}
      environment: ${{ steps.env.outputs.environment }}
    steps:
      - uses: actions/checkout@v4
      - id: vars
        run: |
          IMAGE_TAG="${{ github.run_number }}-${GITHUB_SHA:0:7}"
          echo "short-sha=${GITHUB_SHA:0:7}" >> $GITHUB_OUTPUT
          echo "image-tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
      - id: env
        run: |
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "environment=prod" >> $GITHUB_OUTPUT
          else
            echo "environment=dev" >> $GITHUB_OUTPUT
          fi
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ steps.env.outputs.environment == 'prod' && vars.AWS_ROLE_PROD || vars.AWS_ROLE_DEV }}
          aws-region: ${{ env.AWS_REGION }}
      - id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Build and push
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.vars.outputs.image-tag }}
          ENVIRONMENT: ${{ steps.env.outputs.environment }}
        run: |
          cd agent-service
          docker build -t ${ECR_REGISTRY}/gympt-${ENVIRONMENT}/${ECR_REPOSITORY}:${IMAGE_TAG} .
          docker push ${ECR_REGISTRY}/gympt-${ENVIRONMENT}/${ECR_REPOSITORY}:${IMAGE_TAG}

  update-gitops:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ env.GITOPS_REPO }}
          ref: main
          token: ${{ secrets.GITOPS_PAT }}
      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
      - name: Update image tag
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image-tag }}
          ENVIRONMENT: ${{ needs.build-and-push.outputs.environment }}
        run: |
          VALUES_FILE="charts/agent-service/values-${ENVIRONMENT}.yaml"

          echo "Updating ${VALUES_FILE} with image tag ${IMAGE_TAG}"
          yq -i '.image.tag = strenv(IMAGE_TAG)' "${VALUES_FILE}"

      - name: Commit and push GitOps update
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image-tag }}
          ENVIRONMENT: ${{ needs.build-and-push.outputs.environment }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet; then
            echo "No GitOps changes to commit"
            exit 0
          fi

          git add "charts/agent-service/values-${ENVIRONMENT}.yaml"
          git commit -m "ci: update agent-service ${ENVIRONMENT} image to ${IMAGE_TAG}"
          git pull --rebase origin main
          git push origin main
