name: Lambda Package and Deploy

on:
  push:
    branches: [develop, main]
    paths: ['lambdas/**', '.github/workflows/lambda-package.yml']
  workflow_dispatch:  # 수동 실행 가능

env:
  PYTHON_VERSION: '3.12'
  AWS_REGION: ap-northeast-2

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        lambda:
          - agent-action
          - report-generator
          - posture-event-processor
          - thumbnail-generator
          - wearable-sync
          - recommendation-update
          - notification
          - export
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        working-directory: lambdas/${{ matrix.lambda }}
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov
      - name: Run tests
        working-directory: lambdas/${{ matrix.lambda }}
        run: pytest tests/ -v || echo "No tests found, skipping"

  package-and-upload:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    permissions:
      id-token: write
      contents: read
    strategy:
      matrix:
        lambda:
          - agent-action
          - report-generator
          - posture-event-processor
          - thumbnail-generator
          - wearable-sync
          - recommendation-update
          - notification
          - export
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        working-directory: lambdas/${{ matrix.lambda }}
        run: |
          pip install -r requirements.txt -t package/
          cp handler.py package/

      - name: Create deployment package
        working-directory: lambdas/${{ matrix.lambda }}
        run: |
          cd package
          zip -r ../lambda-${{ matrix.lambda }}-${GITHUB_SHA:0:7}.zip .

      - name: Determine environment
        id: env
        run: |
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "environment=prod" >> $GITHUB_OUTPUT
          else
            echo "environment=dev" >> $GITHUB_OUTPUT
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get S3 bucket
        id: bucket
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          BUCKET="gympt-${{ steps.env.outputs.environment }}-lambda-artifacts-${ACCOUNT_ID}"
          echo "bucket=${BUCKET}" >> $GITHUB_OUTPUT
          echo "Lambda artifacts bucket: ${BUCKET}"

      - name: Upload to S3
        working-directory: lambdas/${{ matrix.lambda }}
        run: |
          aws s3 cp lambda-${{ matrix.lambda }}-${GITHUB_SHA:0:7}.zip \
            s3://${{ steps.bucket.outputs.bucket }}/${{ matrix.lambda }}.zip

      - name: Update Lambda function (optional)
        if: vars.AUTO_UPDATE_LAMBDA == 'true'
        run: |
          aws lambda update-function-code \
            --function-name gympt-${{ steps.env.outputs.environment }}-${{ matrix.lambda }} \
            --s3-bucket ${{ steps.env.outputs.bucket }} \
            --s3-key lambdas/${{ matrix.lambda }}/lambda-${{ matrix.lambda }}-${GITHUB_SHA:0:7}.zip
