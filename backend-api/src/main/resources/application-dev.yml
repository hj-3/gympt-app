# ============================================
# Development Environment Profile (AWS)
# ============================================
# This profile is used in AWS EKS dev environment
# Secrets are injected via External Secrets Operator
# Configuration comes from SSM Parameter Store
# ============================================

spring:
  datasource:
    # Host is injected from Kubernetes Service DNS
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    # Password injected from Kubernetes Secret (External Secrets)
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 3

  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate  # Use Flyway only

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      # Password injected from Kubernetes Secret
      password: ${REDIS_PASSWORD}

  flyway:
    enabled: true
    baseline-on-migrate: true

logging:
  level:
    root: INFO
    com.gympt: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: INFO

app:
  environment: dev

  jwt:
    # Secret injected from Kubernetes Secret (External Secrets)
    secret: ${JWT_SECRET}
    access-token-ttl: 3600
    refresh-token-ttl: 2592000

  aws:
    region: ${AWS_REGION}
    account-id: ${AWS_ACCOUNT_ID}

    s3:
      # No endpoint-url for real AWS S3
      media-bucket: ${S3_MEDIA_BUCKET}
      report-bucket: ${S3_REPORT_BUCKET}

    dynamodb:
      # No endpoint-url for real AWS DynamoDB
      workout-sessions-table: ${DYNAMODB_WORKOUT_SESSIONS_TABLE}
      posture-events-table: ${DYNAMODB_POSTURE_EVENTS_TABLE}
      wearable-events-table: ${DYNAMODB_WEARABLE_EVENTS_TABLE}
      agent-interactions-table: ${DYNAMODB_AGENT_INTERACTIONS_TABLE}

    sqs:
      # No endpoint-url for real AWS SQS
      posture-event-queue-url: ${SQS_POSTURE_EVENT_QUEUE_URL}
      report-generation-queue-url: ${SQS_REPORT_GENERATION_QUEUE_URL}

    eventbridge:
      # No endpoint-url for real AWS EventBridge
      bus-name: ${EVENTBRIDGE_BUS_NAME}

  services:
    # Kubernetes Service DNS names
    agent:
      base-url: http://agent-service:8001
    posture-analysis:
      base-url: http://posture-analysis-service:8002
    report:
      base-url: http://report-service:8003
    notification:
      base-url: http://notification-service:8004

  cors:
    allowed-origins: https://dev.g2mpt.com,https://api-dev.g2mpt.com,http://localhost:3000
    allowed-methods: GET,POST,PUT,PATCH,DELETE,OPTIONS
    allowed-headers: "*"
    allow-credentials: true

  api:
    docs:
      enabled: true  # Enable in dev for testing

  rate-limit:
    enabled: true
    requests-per-minute: 100

# AWS SDK will use IAM Role for Service Account (IRSA)
# No hardcoded credentials needed
