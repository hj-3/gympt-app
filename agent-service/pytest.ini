[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --strict-markers
    --tb=short
    --cov=app
    --cov-report=term-missing
    --cov-report=html
    --cov-report=xml
    --cov-fail-under=80
    --timeout=30
asyncio_mode = auto
markers =
    asyncio: mark test as async
    unit: mark test as unit test (fast, no external dependencies)
    integration: mark test as integration test (requires docker/services)
    e2e: mark test as end-to-end test (full flow)
    performance: mark test as performance/load test
    regression: mark test as regression test
    smoke: mark test as smoke test (critical paths, runs in CI)
    slow: mark test as slow running
    requires_bedrock: mark test as requiring real Bedrock (skip in CI)
    requires_aws: mark test as requiring AWS services
