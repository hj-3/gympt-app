version: '3.8'

# GYMPT Local Observability Stack
# Optional monitoring and observability tools for local development

services:
  # ============================================
  # Monitoring
  # ============================================

  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: gympt-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    volumes:
      - ./configs/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - gympt-local

  grafana:
    image: grafana/grafana:10.4.2
    container_name: gympt-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: grafana-clock-panel,grafana-simple-json-datasource
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./configs/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    networks:
      - gympt-local

  # ============================================
  # Logging
  # ============================================

  loki:
    image: grafana/loki:2.9.6
    container_name: gympt-loki
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    volumes:
      - ./configs/loki-config.yml:/etc/loki/local-config.yaml
      - loki_data:/loki
    networks:
      - gympt-local

  promtail:
    image: grafana/promtail:2.9.6
    container_name: gympt-promtail
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./configs/promtail-config.yml:/etc/promtail/config.yml
      - /var/log:/var/log
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    depends_on:
      - loki
    networks:
      - gympt-local

  # ============================================
  # Tracing
  # ============================================

  jaeger:
    image: jaegertracing/all-in-one:1.55
    container_name: gympt-jaeger
    environment:
      COLLECTOR_ZIPKIN_HOST_PORT: :9411
      COLLECTOR_OTLP_ENABLED: true
    ports:
      - "5775:5775/udp"  # accept zipkin.thrift over compact thrift protocol
      - "6831:6831/udp"  # accept jaeger.thrift over compact thrift protocol
      - "6832:6832/udp"  # accept jaeger.thrift over binary thrift protocol
      - "5778:5778"      # serve configs
      - "16686:16686"    # serve frontend
      - "14268:14268"    # accept jaeger.thrift directly from clients
      - "14250:14250"    # accept model.proto
      - "9411:9411"      # Zipkin compatible endpoint
      - "4317:4317"      # OTLP gRPC
      - "4318:4318"      # OTLP HTTP
    networks:
      - gympt-local

  # ============================================
  # APM
  # ============================================

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.98.0
    container_name: gympt-otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./configs/otel-collector-config.yml:/etc/otel-collector-config.yaml
    ports:
      - "4317:4317"   # OTLP gRPC receiver
      - "4318:4318"   # OTLP HTTP receiver
      - "8888:8888"   # Prometheus metrics exposed by the collector
      - "8889:8889"   # Prometheus exporter metrics
      - "13133:13133" # health_check extension
    depends_on:
      - jaeger
      - prometheus
    networks:
      - gympt-local

volumes:
  prometheus_data:
  grafana_data:
  loki_data:

networks:
  gympt-local:
    external: true
